name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev

      - name: Configure
        run: cmake --preset release-portable -DMATCHING_ENGINE_REQUIRE_GTEST=ON

      - name: Build
        run: cmake --build --preset release-portable -j 2

      - name: Test
        run: ctest --preset release-portable

      - name: Benchmark smoke test
        run: ./build/release-portable/engine_bench
